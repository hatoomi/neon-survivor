<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Survivor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Menu -->
    <div id="menu" class="screen">
        <h1>NEON<br>SURVIVOR</h1>
        <p class="subtitle">Survive the onslaught</p>
        <button id="startBtn" class="btn">START GAME</button>
        <div class="controls-info">
            <p>WASD / Arrows - Move</p>
            <p>Mouse - Aim</p>
            <p>Left Click - Shoot</p>
            <p>P - Pause</p>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover" class="screen hidden">
        <h1>GAME OVER</h1>
        <p id="finalScore" class="final-score"></p>
        <p id="finalWave" class="final-wave"></p>
        <button id="restartBtn" class="btn">PLAY AGAIN</button>
        <button id="menuBtn" class="btn btn-secondary">MAIN MENU</button>
    </div>

    <!-- Pause Overlay -->
    <div id="pauseOverlay" class="screen hidden">
        <h1>PAUSED</h1>
        <button id="resumeBtn" class="btn">RESUME</button>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div id="healthBar">
            <div id="healthFill"></div>
            <span id="healthText">100</span>
        </div>
        <div id="scoreDisplay">SCORE: <span id="scoreValue">0</span></div>
        <div id="waveDisplay">WAVE: <span id="waveValue">1</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Load game modules in order -->
    <script src="bullet.js"></script>
    <script src="particle.js"></script>
    <script src="player.js"></script>
    <script src="enemy.js"></script>
    <script src="game.js"></script>
</body>
</html>
